<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=7">
</head>
<body>

<div class="snap-glow"></div>

<!-- NAVBAR -->
<div class="snap-navbar">
  <a class="snap-logo" href="/">✨ Snap Cluster <span class="snap-room">Room <span id="roomCodeDisplay"></span></span></a>
  <input class="snap-search" placeholder="Search faces, events, rooms..." disabled>
  <div class="snap-nav-actions">
    <button class="snap-btn" onclick="triggerZipPicker()">Upload ZIP</button>
    <button class="snap-btn snap-btn-danger" onclick="deleteRoom()">Delete Room</button>
    <button class="snap-btn snap-btn-primary" onclick="copyLink()">Copy Link</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="snap-sidebar">
  <div class="snap-side-item is-active">All Photos</div>
  <div class="snap-side-item">People</div>
  <div class="snap-side-item">Favorites</div>
  <div class="snap-side-sep"></div>
  <div class="snap-side-meta">Selected: <span id="selectedCount">0</span></div>
  <div class="snap-side-actions">
    <button id="downloadSelectedBtn" class="snap-btn" onclick="downloadSelected()" disabled>Download</button>
    <button id="deleteSelectedBtn" class="snap-btn snap-btn-danger" onclick="deleteSelected()" disabled>Delete</button>
  </div>
</div>

<!-- MAIN -->
<main class="snap-main">
  <!-- Upload results (rendered by JS after upload) -->
  <section id="uploadResults" class="snap-results" hidden>
    <div class="snap-results-head">
      <div class="snap-results-title">Last upload</div>
      <div class="snap-results-meta" id="uploadResultsMeta"></div>
    </div>
    <div class="snap-results-grid" id="uploadResultsGrid"></div>
  </section>

  <div class="snap-gallery" id="gallery"></div>

  <!-- PEOPLE VIEW (clusters + search) -->
  <section id="peopleView" class="snap-results" hidden>
    <div class="snap-results-head">
      <div class="snap-results-title">People</div>
      <div class="snap-nav-actions">
        <button class="snap-btn" onclick="clusterPeople()">Cluster People</button>
        <button class="snap-btn" onclick="triggerSearchPicker()">Search Me</button>
        <button id="peopleDownloadSelectedBtn" class="snap-btn" onclick="downloadSelected()" disabled>Download Selected</button>
        <button id="peopleDeleteSelectedBtn" class="snap-btn snap-btn-danger" onclick="deleteSelected()" disabled>Delete Selected</button>
      </div>
    </div>

    <div id="peopleMeta" class="snap-results-meta"></div>
    <div id="peopleClusters"></div>

    <div id="searchResults" class="snap-results" hidden>
      <div class="snap-results-head">
        <div class="snap-results-title">Search results</div>
        <div class="snap-results-meta" id="searchResultsMeta"></div>
      </div>
      <div class="snap-results-grid" id="searchResultsGrid"></div>
    </div>
  </section>

  <!-- FAVORITES VIEW (favourited people clusters) -->
  <section id="favoritesView" class="snap-results" hidden>
    <div class="snap-results-head">
      <div class="snap-results-title">Favorites</div>
      <div class="snap-nav-actions">
        <button class="snap-btn" onclick="renderFavorites()">Refresh</button>
      </div>
    </div>

    <div id="favoritesMeta" class="snap-results-meta"></div>
    <div id="favoritesClusters"></div>
  </section>
</main>

<!-- Hidden inputs for uploads -->
<input type="file" id="imagesInput" multiple accept="image/*" style="display:none" />
<input type="file" id="zipInput" accept=".zip" style="display:none" />
<input type="file" id="searchInput" accept="image/*" style="display:none" />

<!-- FLOAT UPLOAD -->
<div class="snap-upload-fab" onclick="triggerImagePicker()">⬆ Upload</div>

<script src="{% static 'js/app.js' %}?v=7"></script>
<script>
  // Initialize room page
  document.addEventListener('DOMContentLoaded', () => {
    initRoomPage();
  });
</script>
</body>
</html>
